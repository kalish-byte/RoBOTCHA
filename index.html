<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Am A Robot - CAPTCHA</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="captcha-container" id="captcha">
  <div class="captcha-header">
    <div class="checkbox-area" id="checkbox">
      <div class="spinner"></div>
      <div class="checkmark">✓</div>
    </div>
    <span class="captcha-label">I am a robot</span>
    <div class="brand">
      <div class="icon">🤖</div>
      <div class="text">roBOTCHA</div>
    </div>
  </div>

  <div class="challenge-panel" id="challenge"></div>
  <div class="result-panel" id="result"></div>
</div>

<script src="script.js"></script>
</body>
</html>
