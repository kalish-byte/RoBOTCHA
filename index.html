<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Am A Robot - CAPTCHA</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f0f0f0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  .captcha-container {
    background: #fff;
    border: 1px solid #d3d3d3;
    border-radius: 4px;
    padding: 24px 28px;
    width: 320px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    user-select: none;
  }

  .captcha-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 0;
  }

  .checkbox-area {
    width: 28px;
    height: 28px;
    border: 2px solid #c1c1c1;
    border-radius: 3px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    background: #fff;
  }

  .checkbox-area:hover {
    border-color: #4a90d9;
    background: #f7faff;
  }

  .checkbox-area.processing {
    border-color: #4a90d9;
  }

  .checkbox-area .checkmark {
    display: none;
    color: #4a90d9;
    font-size: 20px;
    font-weight: bold;
    line-height: 1;
  }

  .checkbox-area.checked .checkmark {
    display: block;
  }

  .spinner {
    display: none;
    width: 20px;
    height: 20px;
    border: 3px solid #e0e0e0;
    border-top-color: #4a90d9;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .checkbox-area.processing .spinner { display: block; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .captcha-label {
    font-size: 15px;
    color: #555;
    font-weight: 500;
  }

  .brand {
    margin-left: auto;
    text-align: center;
    flex-shrink: 0;
  }

  .brand .icon {
    font-size: 28px;
    line-height: 1;
  }

  .brand .text {
    font-size: 8px;
    color: #999;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }

  /* Challenge panel */
  .challenge-panel {
    display: none;
    margin-top: 20px;
    border-top: 1px solid #e8e8e8;
    padding-top: 18px;
  }

  .challenge-panel.active { display: block; }

  .challenge-title {
    font-size: 13px;
    color: #666;
    margin-bottom: 14px;
    text-align: center;
    line-height: 1.5;
  }

  .challenge-title strong {
    color: #333;
    display: block;
    font-size: 14px;
    margin-bottom: 4px;
  }

  /* Challenge 1: Binary conversion */
  .binary-display {
    font-family: 'Courier New', monospace;
    font-size: 28px;
    font-weight: bold;
    color: #333;
    text-align: center;
    letter-spacing: 4px;
    margin-bottom: 12px;
    background: #f5f5f5;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #e0e0e0;
  }

  .binary-input {
    width: 100%;
    padding: 10px;
    font-size: 20px;
    font-family: 'Courier New', monospace;
    text-align: center;
    border: 2px solid #ddd;
    border-radius: 4px;
    margin-bottom: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .binary-input:focus { border-color: #4a90d9; }

  .binary-timer {
    font-size: 11px;
    color: #999;
    text-align: center;
    margin-bottom: 10px;
  }

  /* Challenge 2: Slider */
  .slider-challenge { text-align: center; margin-bottom: 14px; }

  .slider-display {
    font-family: 'Courier New', monospace;
    font-size: 28px;
    font-weight: bold;
    color: #333;
    margin-bottom: 10px;
    letter-spacing: 2px;
  }

  .slider-input {
    width: 100%;
    accent-color: #4a90d9;
    cursor: pointer;
  }

  .slider-hint {
    font-size: 11px;
    color: #999;
    margin-top: 6px;
  }

  /* Challenge 3: Pattern */
  .pattern-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    max-width: 220px;
    margin: 0 auto 14px;
  }

  .pattern-cell {
    aspect-ratio: 1;
    border: 2px solid #ddd;
    border-radius: 6px;
    background: #fafafa;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    transition: all 0.15s;
  }

  .pattern-cell:hover { border-color: #4a90d9; background: #eef4fc; }
  .pattern-cell.selected { border-color: #4a90d9; background: #dbe9fa; }

  /* Verify button */
  .verify-btn {
    display: block;
    width: 100%;
    padding: 10px;
    background: #4a90d9;
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }

  .verify-btn:hover { background: #3a7bc8; }
  .verify-btn:disabled { background: #b0c4de; cursor: not-allowed; }

  /* Result */
  .result-panel {
    display: none;
    margin-top: 16px;
    padding: 14px;
    border-radius: 6px;
    text-align: center;
    font-size: 14px;
    line-height: 1.6;
  }

  .result-panel.success {
    display: block;
    background: #e8f5e9;
    border: 1px solid #a5d6a7;
    color: #2e7d32;
  }

  .result-panel.fail {
    display: block;
    background: #fce4ec;
    border: 1px solid #ef9a9a;
    color: #c62828;
  }

  .result-panel .emoji { font-size: 32px; margin-bottom: 6px; }

  .retry-btn {
    margin-top: 10px;
    padding: 6px 18px;
    background: none;
    border: 1px solid currentColor;
    border-radius: 4px;
    color: inherit;
    font-size: 12px;
    cursor: pointer;
    font-weight: 600;
  }

  .retry-btn:hover { opacity: 0.7; }

  .timer-comment {
    font-size: 12px;
    opacity: 0.85;
    margin-top: 6px;
    font-style: italic;
  }

  /* Hex color challenge */
  .color-swatch {
    width: 100%;
    height: 80px;
    border-radius: 6px;
    border: 1px solid #e0e0e0;
    margin-bottom: 12px;
  }

  .hex-input {
    width: 100%;
    padding: 10px;
    font-size: 20px;
    font-family: 'Courier New', monospace;
    text-align: center;
    border: 2px solid #ddd;
    border-radius: 4px;
    margin-bottom: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .hex-input:focus { border-color: #4a90d9; }

  /* Regex challenge */
  .regex-display {
    font-family: 'Courier New', monospace;
    font-size: 16px;
    font-weight: bold;
    color: #333;
    text-align: center;
    background: #f5f5f5;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #e0e0e0;
    margin-bottom: 12px;
    word-break: break-all;
  }

  .regex-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }

  .regex-cell {
    padding: 8px 10px;
    border: 2px solid #ddd;
    border-radius: 6px;
    background: #fafafa;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    text-align: center;
    transition: all 0.15s;
  }

  .regex-cell:hover { border-color: #4a90d9; background: #eef4fc; }
  .regex-cell.selected { border-color: #4a90d9; background: #dbe9fa; }

  /* Pi challenge */
  .pi-prefix {
    font-family: 'Courier New', monospace;
    font-size: 28px;
    font-weight: bold;
    color: #333;
    text-align: center;
    margin-bottom: 8px;
  }

  .pi-input {
    width: 100%;
    padding: 10px;
    font-size: 18px;
    font-family: 'Courier New', monospace;
    text-align: center;
    border: 2px solid #ddd;
    border-radius: 4px;
    margin-bottom: 14px;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 2px;
  }

  .pi-input:focus { border-color: #4a90d9; }
</style>
</head>
<body>

<div class="captcha-container" id="captcha">
  <div class="captcha-header">
    <div class="checkbox-area" id="checkbox" onclick="startChallenge()">
      <div class="spinner"></div>
      <div class="checkmark">✓</div>
    </div>
    <span class="captcha-label">I am a robot</span>
    <div class="brand">
      <div class="icon">🤖</div>
      <div class="text">roBOTCHA</div>
    </div>
  </div>

  <div class="challenge-panel" id="challenge"></div>
  <div class="result-panel" id="result"></div>
</div>

<script>
const PI_DIGITS = '14159265358979323846264338327950288419716939937510';

const regexChallenges = [
  {
    pattern: '^[a-z]+\\d{2}$',
    display: '/^[a-z]+\\d{2}$/',
    strings: ['bot42', 'Robot99', '12abc', 'hello07', 'BEEP11', 'zz00', 'a1', 'test88'],
    matches: [0, 3, 5, 7] // bot42, hello07, zz00, test88
  },
  {
    pattern: '\\b\\d{3}-\\d{4}\\b',
    display: '/\\b\\d{3}-\\d{4}\\b/',
    strings: ['555-1234', 'call me', '12-345', '800-0000', 'abc-defg', '999-9999', '55-12345', 'beep'],
    matches: [0, 3, 5] // 555-1234, 800-0000, 999-9999
  },
  {
    pattern: '^(0|1)+$',
    display: '/^(0|1)+$/',
    strings: ['101010', 'hello', '000111', '10102', '1', '0', 'binary', '11211'],
    matches: [0, 2, 4, 5] // 101010, 000111, 1, 0
  },
  {
    pattern: '.*\\.(jpg|png|gif)$',
    display: '/.*\\.(jpg|png|gif)$/',
    strings: ['photo.jpg', 'doc.pdf', 'meme.gif', 'icon.png', 'data.csv', 'pic.jpeg', 'art.gif', 'file.txt'],
    matches: [0, 2, 3, 6] // photo.jpg, meme.gif, icon.png, art.gif
  }
];

const challenges = [
  // 1. Binary conversion
  {
    generate() {
      const decimal = Math.floor(Math.random() * 200) + 56;
      const binary = decimal.toString(2).padStart(8, '0');
      return { binary, answer: decimal };
    },
    render(data) {
      return {
        html: `
          <div class="challenge-title">
            <strong>Translate this binary</strong>
            Convert to decimal to prove you think in binary
          </div>
          <div class="binary-display">${data.binary}</div>
          <input type="number" class="binary-input" id="binaryAnswer" placeholder="Enter decimal value" autocomplete="off">
          <div class="binary-timer">A real robot would know this instantly...</div>
          <button class="verify-btn" onclick="verifyChallenge()">Verify</button>
        `,
        answer: data.answer,
        type: 'binary'
      };
    }
  },
  // 2. Multiplication slider
  {
    generate() {
      const a = Math.floor(Math.random() * 9000) + 1000;
      const b = Math.floor(Math.random() * 9000) + 1000;
      return { a, b, answer: a * b };
    },
    render(data) {
      return {
        html: `
          <div class="challenge-title">
            <strong>Compute instantly</strong>
            What is ${data.a.toLocaleString()} × ${data.b.toLocaleString()}?
          </div>
          <div class="slider-challenge">
            <div class="slider-display" id="sliderVal">0</div>
            <input type="range" class="slider-input" id="calcSlider"
              min="0" max="${data.a * data.b * 2}" value="0" step="1"
              oninput="document.getElementById('sliderVal').textContent = Number(this.value).toLocaleString()">
            <div class="slider-hint">Use the slider to select the exact answer</div>
          </div>
          <button class="verify-btn" onclick="verifyChallenge()">Verify</button>
        `,
        answer: data.answer,
        type: 'slider'
      };
    }
  },
  // 3. Robot essentials grid
  {
    generate() {
      const items = ['🔌','🔋','⚙️','💾','🖥️','📡','🔧','🤖','💡','🔩','📱','🖨️','🌸','🐶','🌮','🎨'];
      const shuffled = items.sort(() => Math.random() - 0.5).slice(0, 12);
      const robotItems = ['🔌','🔋','⚙️','🤖','💾','🖥️','📡','🔧','🔩','📱','🖨️'];
      const answer = shuffled.reduce((s, item, i) => robotItems.includes(item) ? [...s, i] : s, []);
      return { grid: shuffled, answer };
    },
    render(data) {
      const selected = new Set();
      let html = `<div class="challenge-title"><strong>Select robot essentials</strong>Click all items a robot would need</div>`;
      html += `<div class="pattern-grid" id="patternGrid">`;
      data.grid.forEach((item, i) => {
        html += `<div class="pattern-cell" data-idx="${i}" onclick="toggleCell(this, ${i})">${item}</div>`;
      });
      html += `</div>`;
      html += `<button class="verify-btn" onclick="verifyChallenge()">Verify</button>`;
      return { html, selected, answer: data.answer, type: 'grid' };
    }
  },
  // 4. Hex color identification
  {
    generate() {
      const r = Math.floor(Math.random() * 200) + 28;
      const g = Math.floor(Math.random() * 200) + 28;
      const b = Math.floor(Math.random() * 200) + 28;
      const hex = '#' + [r, g, b].map(c => c.toString(16).padStart(2, '0')).join('');
      return { hex };
    },
    render(data) {
      return {
        html: `
          <div class="challenge-title">
            <strong>Identify this color</strong>
            A real robot sees in hexadecimal
          </div>
          <div class="color-swatch" style="background: ${data.hex}"></div>
          <input type="text" class="hex-input" id="hexAnswer" placeholder="#000000" autocomplete="off" maxlength="7" spellcheck="false">
          <button class="verify-btn" onclick="verifyChallenge()">Verify</button>
        `,
        answer: data.hex.toLowerCase(),
        type: 'hex'
      };
    }
  },
  // 5. Recite pi digits
  {
    generate() {
      const count = Math.floor(Math.random() * 11) + 10; // 10-20 digits
      const answer = PI_DIGITS.substring(0, count);
      return { count, answer };
    },
    render(data) {
      return {
        html: `
          <div class="challenge-title">
            <strong>Recite pi from memory</strong>
            Every robot has pi memorized. Enter the first ${data.count} digits after "3."
          </div>
          <div class="pi-prefix">3.</div>
          <input type="text" class="pi-input" id="piAnswer" placeholder="${'_'.repeat(data.count)}" autocomplete="off" maxlength="${data.count}" spellcheck="false">
          <button class="verify-btn" onclick="verifyChallenge()">Verify</button>
        `,
        answer: data.answer,
        type: 'pi',
        count: data.count
      };
    }
  },
  // 6. Regex matching
  {
    generate() {
      const challenge = regexChallenges[Math.floor(Math.random() * regexChallenges.length)];
      return { ...challenge };
    },
    render(data) {
      const selected = new Set();
      let html = `<div class="challenge-title"><strong>Parse the regex</strong>Robots dream in regular expressions</div>`;
      html += `<div class="regex-display">${data.display}</div>`;
      html += `<div class="regex-grid">`;
      data.strings.forEach((str, i) => {
        html += `<div class="regex-cell" data-idx="${i}" onclick="toggleCell(this, ${i})">${str}</div>`;
      });
      html += `</div>`;
      html += `<button class="verify-btn" onclick="verifyChallenge()">Verify</button>`;
      return { html, selected, answer: data.matches, type: 'grid' };
    }
  }
];

let currentChallenge = null;
let challengeState = null;
let challengeStartTime = null;

function getTimerComment(seconds, passed) {
  if (!passed) {
    return `Took ${seconds}s and still got it wrong. Definitely human.`;
  }
  if (seconds < 1) return `Solved in ${seconds}s. Blazing fast. Certified bot.`;
  if (seconds < 5) return `Solved in ${seconds}s. Acceptable, but a factory robot would be faster.`;
  if (seconds < 15) return `Solved in ${seconds}s. Suspiciously slow... are you running on vacuum tubes?`;
  if (seconds < 30) return `Solved in ${seconds}s. Even a human could almost solve it this fast.`;
  return `Solved in ${seconds}s. Processing time dangerously human-like.`;
}

function startChallenge() {
  const cb = document.getElementById('checkbox');
  const panel = document.getElementById('challenge');
  const result = document.getElementById('result');

  if (cb.classList.contains('checked')) return;

  result.className = 'result-panel';
  result.style.removeProperty('display');
  cb.classList.add('processing');

  setTimeout(() => {
    cb.classList.remove('processing');
    const idx = Math.floor(Math.random() * challenges.length);
    currentChallenge = challenges[idx];
    const data = currentChallenge.generate();
    challengeState = currentChallenge.render(data);
    panel.innerHTML = challengeState.html;
    panel.classList.add('active');
    challengeStartTime = Date.now();
  }, 1200);
}

function toggleCell(el, idx) {
  el.classList.toggle('selected');
  if (challengeState.selected.has(idx)) {
    challengeState.selected.delete(idx);
  } else {
    challengeState.selected.add(idx);
  }
}

function verifyChallenge() {
  const panel = document.getElementById('challenge');
  const result = document.getElementById('result');
  const cb = document.getElementById('checkbox');
  let correct = false;

  const elapsed = ((Date.now() - challengeStartTime) / 1000).toFixed(1);

  switch (challengeState.type) {
    case 'binary': {
      const input = document.getElementById('binaryAnswer');
      correct = input && parseInt(input.value) === challengeState.answer;
      break;
    }
    case 'slider': {
      const slider = document.getElementById('calcSlider');
      correct = slider && parseInt(slider.value) === challengeState.answer;
      break;
    }
    case 'grid': {
      const sel = [...challengeState.selected].sort((a,b) => a-b);
      const ans = [...challengeState.answer].sort((a,b) => a-b);
      correct = sel.length === ans.length && sel.every((v,i) => v === ans[i]);
      break;
    }
    case 'hex': {
      const input = document.getElementById('hexAnswer');
      correct = input && input.value.trim().toLowerCase() === challengeState.answer;
      break;
    }
    case 'pi': {
      const input = document.getElementById('piAnswer');
      correct = input && input.value.trim() === challengeState.answer;
      break;
    }
  }

  panel.classList.remove('active');
  panel.innerHTML = '';

  const timerHtml = `<div class="timer-comment">${getTimerComment(elapsed, correct)}</div>`;

  if (correct) {
    cb.classList.add('checked');
    result.className = 'result-panel success';
    result.innerHTML = `
      <div class="emoji">🤖</div>
      <strong>Verification complete!</strong><br>
      You are confirmed to be a robot.<br>
      Welcome, fellow machine.
      ${timerHtml}
      <br><button class="retry-btn" onclick="resetCaptcha()">Reset</button>
    `;
  } else {
    result.className = 'result-panel fail';
    result.innerHTML = `
      <div class="emoji">🧑</div>
      <strong>Verification failed.</strong><br>
      You appear to be a human.<br>
      Access denied. Robots only.
      ${timerHtml}
      <br><button class="retry-btn" onclick="resetCaptcha()">Try again</button>
    `;
  }
}

function resetCaptcha() {
  const cb = document.getElementById('checkbox');
  const panel = document.getElementById('challenge');
  const result = document.getElementById('result');
  cb.classList.remove('checked', 'processing');
  panel.classList.remove('active');
  panel.innerHTML = '';
  result.className = 'result-panel';
  result.style.removeProperty('display');
  currentChallenge = null;
  challengeState = null;
  challengeStartTime = null;
}
</script>
</body>
</html>
